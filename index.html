<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- =====================================================================
         Skip-link: lets keyboard users jump straight to content (WCAG 2.4.1)
         ===================================================================== -->
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <!-- =====================================================================
         Application Header
         Contains the app title and the primary navigation.
         role="banner" is implicit for <header> at page level but stated
         explicitly on the inner wrapper for clarity.
         ===================================================================== -->
    <header role="banner">
        <div class="header-inner">
            <h1 class="app-title">
                <!-- SVG clipboard icon (inline, no image request) -->
                <svg class="app-icon" aria-hidden="true" focusable="false"
                     xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                     width="28" height="28" fill="currentColor">
                    <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5
                             c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9
                             2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45
                             1-1 1-1-.45-1-1 .45-1 1-1zm7 16H5V5h2v3h10V5h2v14z"/>
                </svg>
                Student Attendance Manager
            </h1>

            <!-- =============================================================
                 Primary navigation
                 role="navigation" is implicit for <nav> but aria-label
                 distinguishes it from any secondary navs on the page.
                 ============================================================= -->
            <nav id="main-nav" aria-label="Primary navigation">

                <!-- Hamburger button — visible only on mobile (<768 px) -->
                <button class="nav-toggle"
                        aria-controls="nav-menu"
                        aria-expanded="false"
                        aria-label="Open navigation menu"
                        type="button">
                    <span class="hamburger" aria-hidden="true"></span>
                    <span class="hamburger" aria-hidden="true"></span>
                    <span class="hamburger" aria-hidden="true"></span>
                </button>

                <!-- Nav item list -->
                <ul class="nav-menu" id="nav-menu" role="list">
                    <li role="listitem">
                        <a href="#students"
                           class="nav-link active"
                           data-section="students"
                           aria-current="page">
                            <!-- Inline icon -->
                            <svg class="nav-icon" aria-hidden="true" focusable="false"
                                 xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                 width="18" height="18" fill="currentColor">
                                <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5
                                         16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8
                                         0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34
                                         5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33
                                         0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8
                                         0c-.29 0-.62.02-.97.05 1.16.84 1.97
                                         1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                            </svg>
                            Students
                        </a>
                    </li>
                    <li role="listitem">
                        <a href="#courses"
                           class="nav-link"
                           data-section="courses">
                            <svg class="nav-icon" aria-hidden="true" focusable="false"
                                 xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                 width="18" height="18" fill="currentColor">
                                <path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2
                                         2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6
                                         4h5v8l-2.5-1.5L6 12V4z"/>
                            </svg>
                            Courses
                        </a>
                    </li>
                    <li role="listitem">
                        <a href="#attendance"
                           class="nav-link"
                           data-section="attendance">
                            <svg class="nav-icon" aria-hidden="true" focusable="false"
                                 xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                 width="18" height="18" fill="currentColor">
                                <path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11
                                         0-1.99.9-1.99 2L3 19c0 1.1.89 2 2
                                         2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3
                                         18H5V8h14v11z"/>
                            </svg>
                            Attendance
                        </a>
                    </li>
                    <li role="listitem">
                        <a href="#reports"
                           class="nav-link"
                           data-section="reports">
                            <svg class="nav-icon" aria-hidden="true" focusable="false"
                                 xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                 width="18" height="18" fill="currentColor">
                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2
                                         2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9
                                         17H7v-7h2v7zm4 0h-2V7h2v10zm4
                                         0h-2v-4h2v4z"/>
                            </svg>
                            Reports
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- =====================================================================
         Breadcrumb
         Hidden by default; shown with .visible when navigating to a detail
         view. aria-label distinguishes it from the primary nav.
         ===================================================================== -->
    <nav class="breadcrumb" id="breadcrumb"
         aria-label="Breadcrumb"
         aria-hidden="true">
        <div class="breadcrumb-inner">
            <ol>
                <!-- Populated dynamically by app.js -->
            </ol>
        </div>
    </nav>

    <!-- =====================================================================
         Main content area
         id="main-content" is the skip-link target.
         ===================================================================== -->
    <main id="main-content" tabindex="-1">

        <!-- Students section -->
        <section id="students-section"
                 class="content-section active"
                 aria-labelledby="students-heading"
                 role="region">
            <div class="section-header">
                <h2 id="students-heading">Students</h2>
            </div>
            <div id="students-content" class="section-body">
                <!-- Student management UI inserted by Task 11 -->
            </div>
        </section>

        <!-- Courses section -->
        <section id="courses-section"
                 class="content-section"
                 aria-labelledby="courses-heading"
                 role="region">
            <div class="section-header">
                <h2 id="courses-heading">Courses</h2>
            </div>
            <div id="courses-content" class="section-body">
                <!-- Course management UI inserted by Task 12 -->
            </div>
        </section>

        <!-- Attendance Recording section -->
        <section id="attendance-section"
                 class="content-section"
                 aria-labelledby="attendance-heading"
                 role="region">
            <div class="section-header">
                <h2 id="attendance-heading">Attendance Recording</h2>
            </div>
            <div id="attendance-content" class="section-body">
                <!-- Attendance recording UI inserted by Task 13 -->
            </div>
        </section>

        <!-- Reports section -->
        <section id="reports-section"
                 class="content-section"
                 aria-labelledby="reports-heading"
                 role="region">
            <div class="section-header">
                <h2 id="reports-heading">Reports</h2>
            </div>
            <div id="reports-content" class="section-body">
                <!-- Reports UI inserted by Task 15 -->
            </div>
        </section>

    </main>

    <!-- =====================================================================
         Footer
         ===================================================================== -->
    <footer role="contentinfo">
        <p>Student Attendance Manager &mdash; all data stored locally in your browser.</p>
    </footer>

    <!-- =====================================================================
         Toast notification container
         Toasts are appended here by showSuccess() / showError()
         Individual toasts carry role="status" (success) or role="alert" (error)
         ===================================================================== -->
    <div id="toast-container"
         class="toast-container"
         aria-live="polite"
         aria-atomic="false">
    </div>

    <!-- =====================================================================
         Loading overlay
         Shown by showLoading(), hidden by hideLoading()
         ===================================================================== -->
    <div id="loading-overlay"
         class="loading-overlay hidden"
         aria-hidden="true">
        <div class="loading-spinner" aria-hidden="true"></div>
        <span class="loading-text">Loading&hellip;</span>
    </div>

    <!-- =====================================================================
         Confirmation dialog (modal)
         Populated and opened by showConfirmDialog()
         ===================================================================== -->
    <div id="confirm-overlay" class="modal-overlay hidden">
        <dialog id="confirm-dialog"
                class="confirm-dialog"
                aria-modal="true"
                aria-labelledby="confirm-title"
                aria-describedby="confirm-message">
            <h3 id="confirm-title"   class="confirm-title">Confirm</h3>
            <p  id="confirm-message" class="confirm-message"></p>
            <div class="confirm-actions">
                <button id="confirm-cancel" class="btn btn-secondary" type="button">Cancel</button>
                <button id="confirm-ok"     class="btn btn-danger"    type="button">Confirm</button>
            </div>
        </dialog>
    </div>

    <!-- =====================================================================
         Scripts  (dependency order: utils → models → storage → modules → app)
         ===================================================================== -->
    <script src="utils.js"></script>
    <script src="models.js"></script>
    <script src="storage.js"></script>
    <script src="studentModule.js"></script>
    <script src="courseModule.js"></script>
    <script src="attendanceModule.js"></script>
    <script src="reportModule.js"></script>
    <script src="studentUI.js"></script>
    <script src="app.js"></script>

</body>
</html>
